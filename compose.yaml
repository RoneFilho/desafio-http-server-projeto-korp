services:
  http-server:
    container_name: http-server-korp
    build: ./http-server-projeto-korp
    networks:
      - projkorpnet

  nginx:
    container_name: nginx-proxy
    build: ./nginx
    ports:
      - 80:80
    volumes:
      - nginx-config:/etc/nginx/conf.d/
    networks:
      - projkorpnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      - http-server
  
  prometheus:
    container_name: prom-metrics
    build: ./prometheus
    ports:
      - 9090:9090
    volumes:
      - prom-config:/etc/prometheus/
    networks:
      - projkorpnet
    depends_on:
      - nginx

  grafana:
    container_name: grafana-dash
    build: ./grafana
    ports:
      - 3000:3000
    networks:
      - projkorpnet
    depends_on:
      - prometheus

volumes:
  nginx-config:
  prom-config:

networks:
  projkorpnet:
    driver: bridge
